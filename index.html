<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bool Tok</title>
  <link rel="icon" href="assets/img/booltok_logo.png">
  


  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">


  <!-- TikTok Sans -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=TikTok+Sans:opsz,wght@12..36,300..900&display=swap"
    rel="stylesheet">

  <!-- Stylesheet -->
  <link rel="stylesheet" href="css/style.css">

</head>

<body>
  <!-- Container della pagina, necessario per via del layout particolare -->
  <div class="reel-page debug container">
    <video src="videos/coder.mp4" autoplay muted loop></video>

    <!-- Header -->
    <header class="reel-header">
        <div>
          <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="currentColor" class="bi bi-search" viewBox="0 0 16 16">
          <path d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001q.044.06.098.115l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85a1 1 0 0 0-.115-.1zM12 6.5a5.5 5.5 0 1 1-11 0 5.5 5.5 0 0 1 11 0"/>
          </svg>
        </div>
        <nav class="header-nav">
          <p>Esplora</p>
          <p>Seguiti</p>
          <p>Per te</p>
          <span>_</span>
        </nav>
        <div>
          <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="currentColor" class="bi bi-play-btn" viewBox="0 0 16 16">
          <path d="M6.79 5.093A.5.5 0 0 0 6 5.5v5a.5.5 0 0 0 .79.407l3.5-2.5a.5.5 0 0 0 0-.814z"/>
          <path d="M0 4a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2zm15 0a1 1 0 0 0-1-1H2a1 1 0 0 0-1 1v8a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1z"/>
          </svg>
        </div>
    </header>


    <!-- Sidebar -->
    <div class="sidebar">
        <div>
          <img class="channel-pic" src="img/boolean_logo.png" alt="logo boolean">
        </div>
        <div>
          <i class="bi bi-heart"></i>
          <div class="counter like">
            588
          </div>
        </div>
        <div>
          <i class="bi bi-chat-dots-fill"></i>
          <div class="counter like">
            13
          </div>
        </div>
        <div>
          <i class="bi bi-bookmark-fill"></i>
          <div class="counter like">
            638
          </div>
        </div>
        <div>
          <i class="bi bi-sign-turn-slight-right-fill"></i>
          <div class="counter like">
            491
          </div>
        </div>
        
    </div>
    
    <!-- Footer -->
    <footer>
      <div class="footer-icon">
        <i class="bi bi-house-fill"></i>
        <p>Home</p>
      </div>
      <div class="footer-icon">
        <i class="bi bi-people"></i>
        <p>Amici</p>
      </div>
      <div class="footer-icon">
        <i class="bi bi-file-plus"></i>
      </div>
      <div class="footer-icon">
        <i class="bi bi-chat-square"></i>
        <p>Posta in arrivo</p>
      </div>
      <div class="footer-icon">
        <i class="bi bi-person"></i>
        <p>Profilo</p>
      </div>

    </footer>
  </div>

</body>

</html>
